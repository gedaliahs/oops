name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binaries
        run: scripts/build-release.sh "${GITHUB_REF_NAME#v}"

      - name: Generate Homebrew formula
        run: scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME#v}" dist/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets
        run: |
          for file in dist/*.tar.gz dist/SHA256SUMS; do
            cosign sign-blob --yes --bundle "${file}.sigstore" "$file"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/*.sigstore
            packaging/homebrew/oops.rb
          generate_release_notes: true
