name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test -race ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binaries
        run: scripts/build-release.sh "${GITHUB_REF_NAME#v}"

      - name: Generate Homebrew formula
        run: scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME#v}" dist/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets
        run: |
          for file in dist/*.tar.gz dist/SHA256SUMS; do
            cosign sign-blob --yes --bundle "${file}.sigstore" "$file"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/*.sigstore
            packaging/homebrew/oops.rb
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap update."
            exit 0
          fi
          tmp=$(mktemp -d)
          git clone --quiet "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/gedaliahs/homebrew-tap.git" "$tmp"
          mkdir -p "$tmp/Formula"
          cp packaging/homebrew/oops.rb "$tmp/Formula/oops.rb"
          cd "$tmp"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/oops.rb
          git commit -m "Update oops to ${GITHUB_REF_NAME}" || exit 0
          git push --quiet
